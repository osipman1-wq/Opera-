name: Build All Hub APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Build Web Project
        run: npm run build

      - name: Initialize Capacitor and Sync Android
        run: |
          # 1. Initialize Capacitor with the required App ID and Name
          # This fixes the "Missing appId" error
          npx cap init "All Hub" "com.allhub.app" --web-dir dist --force

          # 2. Add the Android platform
          npx cap add android

          # 3. Sync the web code to the Android project
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-hub-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
