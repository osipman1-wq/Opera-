name: Build All Hub APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Build Web Project
        run: npm run build

      - name: Fresh Capacitor Android Setup
        run: |
          # Delete any existing android folder to prevent "Duplicate Class" errors
          rm -rf android
          
          # Initialize configuration
          npx cap init "All Hub" "com.allhub.app" --web-dir dist
          
          # Add a clean Android platform
          npx cap add android
          
          # Sync the build
          npx cap sync android

      - name: Force Fix Android Dependencies
        run: |
          cd android
          # This forces all libraries to use a single version and ignores conflict warnings
          echo "subprojects {
              project.configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion '1.9.10'
                      }
                  }
              }
          }" >> build.gradle
          
          # Basic Android settings for compatibility
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Build Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: All-Hub-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
