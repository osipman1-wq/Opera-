name: Build All Hub APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Build Web Project
        run: npm run build

      - name: Initialize and Sync Capacitor
        run: |
          # Create config if missing (This fixes the AppId error)
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "All Hub" "com.allhub.app" --web-dir dist
          fi

          # Add android platform if the folder is missing
          if [ ! -d "android" ]; then
            npx cap add android
          fi

          # Sync web assets to Android
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: All-Hub-Release-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
