name: Build All Hub APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # This fixes the 'invalid source release: 21' error

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Build Web Project
        run: npm run build

      - name: Reset and Sync Capacitor
        run: |
          # Fresh start: delete old android folder and re-add to avoid 'Duplicate Class'
          rm -rf android
          npx cap init "All Hub" "com.allhub.app" --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Force Dependency Resolution
        run: |
          # This script forces all plugins to use a single Kotlin version (1.9.10)
          cd android
          echo "subprojects {
              project.configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion '1.9.10'
                      }
                  }
              }
          }" >> build.gradle
          
          # Fix common Android build properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Build Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: All-Hub-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
