name: Build All Hub APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Build Web Project
        run: npm run build

      - name: Reset and Re-Initialize Android
        run: |
          # Kill the old, broken folder
          rm -rf android
          
          # Re-initialize everything fresh
          npx cap init "All Hub" "com.allhub.app" --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Force Fix Android Dependencies
        run: |
          cd android
          # This forces all libraries to use Kotlin 1.9.10, killing the 'Duplicate Class' error
          echo "subprojects {
              project.configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion '1.9.10'
                      }
                  }
              }
          }" >> build.gradle
          
          # Fix common Android build properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Final Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: All-Hub-Success-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
