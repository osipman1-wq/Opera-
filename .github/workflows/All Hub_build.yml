name: Build All Hub APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Using the most stable version for Android builds

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Build Web Project
        run: npm run build

      - name: Initialize and Sync Capacitor
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "All Hub" "com.allhub.app" --web-dir dist
          fi
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Force Clean Build & Resolve Conflicts
        run: |
          # This forces the project to use one version of Kotlin to stop the Duplicate Class error
          cd android
          echo "subprojects {
              project.configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion '1.9.10'
                      }
                  }
              }
          }" >> build.gradle

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: All-Hub-Final-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
